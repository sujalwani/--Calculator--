<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>
<body>
    <div class="calculator" id="calculator">
        <input type="text" id="inputBox" placeholder="0" >
        <div>
            <button class="OperatorBtn" id="clear">Ac</button>
            <button class="OperatorBtn" id="delete">Del</button>
            <button class="OperatorBtn">%</button>
            <button class="OperatorBtn">/</button>
        </div>
        <div>
            <button>9</button>
            <button>8</button>
            <button>7</button>
            <button class="OperatorBtn">*</button>
        </div>
        <div>
            <button>6</button>
            <button>5</button>
            <button>4</button>
            <button class="OperatorBtn">-</button>
        </div>
        <div>
            <button>3</button>
            <button>2</button>
            <button>1</button>
            <button class="OperatorBtn">+</button>
        </div>
        <div>
            <button >00</button>
            <button>0</button>
            <button>.</button>
            <button class="EqualBtn" id="equal">=</button> 
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
